name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token — CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  UV_NO_SOURCES: "1"


jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --no-sources --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check (mypy + pyright, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --no-sources --all-extras
      - name: mypy --strict
        run: uv run mypy
      - name: pyright --strict
        run: uv run pyright

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --no-sources --all-extras
      - name: bandit
        run: uv run bandit -q -c pyproject.toml -r .
      - name: pip-audit
        run: uv run pip-audit

  test:
    name: Unit Tests (in-process sqlite; no infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --no-sources --all-extras
      - name: pytest
        run: uv run pytest

  integration:
    name: Integration Tests (testcontainers / Docker)
    runs-on: ubuntu-latest # Docker is preinstalled on GitHub-hosted ubuntu runners
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --no-sources --all-extras
      - name: pytest -m integration
        run: uv run pytest tests/integration -m integration --tb=short

  contract:
    name: API Contract (openapi + typed client not drifted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --no-sources --all-extras
      - run: cd frontend && npm ci
      # regenerate the exported OpenAPI doc + the orval client from the live API; if either
      # differs from what's committed, the single typed contract has silently drifted — fail.
      - name: openapi + client not drifted
        # Pin the two env vars that shape the contract (APP_NAME → title, APP_DEBUG → the
        # debug-only dev-gateway routes) to the canonical defaults, matching `make openapi`, so
        # the check is deterministic and never depends on the runner's ambient env.
        env:
          APP_NAME: arvel-ecommerce-kit
          APP_DEBUG: "false"
        run: |
          uv run arvel openapi:export frontend/openapi.json
          cd frontend && npm run api:generate
          cd .. && git diff --exit-code frontend/openapi.json frontend/src/api/gen

  frontend:
    name: Frontend (vue-tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: prettier --check
        run: npx prettier . --check
      - name: build (vue-tsc + vite)
        run: npm run build
