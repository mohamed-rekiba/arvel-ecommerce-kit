[project]
name = "arvel-ecommerce-kit"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = ["arvel[standard,sqlite,telemetry]"]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "faker"]

[tool.uv.sources]
# arvel is not yet published — the kit is the proof app for the local framework build.
# Clone the `arvel` repo as a sibling directory (../arvel) before `uv sync`.
arvel = { path = "../arvel", editable = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.metadata]
allow-direct-references = true
