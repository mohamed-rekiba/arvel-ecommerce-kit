# Local infrastructure for the kit — every service the app exercises.
#   docker compose up -d          # start all
#   docker compose up -d db redis # or a subset
# Then `make setup` (migrate + seed). Credentials match .env.example, so no edits are needed.
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: arvel
      POSTGRES_PASSWORD: arvel
      POSTGRES_DB: arvel_ecommerce_kit
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql"] # postgres:18 stores data in a version-specific subdir here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arvel -d arvel_ecommerce_kit"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Valkey — Redis-protocol cache + queue backend (wire-compatible, so URLs stay redis://).
  valkey:
    image: valkey/valkey:9-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports: ["5672:5672", "15672:15672"] # AMQP + management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Full-text search (Meilisearch) — the product catalog search engine.
  meilisearch:
    image: getmeili/meilisearch:v1.48
    environment:
      MEILI_MASTER_KEY: arvel-dev-master-key
      MEILI_ENV: development
    ports: ["7700:7700"]
    volumes: ["meili_data:/meili_data"]
    healthcheck:
      # `localhost` resolves to ::1 inside the container while Meilisearch binds IPv4-only, so the
      # probe must name 127.0.0.1 — with `localhost` the container reports unhealthy forever.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 3s
      timeout: 3s
      retries: 10

  # S3-compatible object storage (RustFS). S3 API on :9000.
  rustfs:
    image: rustfs/rustfs:latest
    ports: ["9000:9000", "9001:9001"]
    environment:
      RUSTFS_ACCESS_KEY: arvel
      RUSTFS_SECRET_KEY: arvelsecret
      RUSTFS_VOLUMES: /data
    volumes: ["rustfs_data:/data"]

  # Admin SSO. Dev mode, no TLS. Create the `arvel` realm + `arvel-admin` client after first boot
  # (or import a realm export) — see README "Admin OIDC".
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: ["start-dev", "--import-realm"] # imports the `arvel` realm on first boot
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports: ["8080:8080"]
    volumes:
      - ./.docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  # Mail catcher — SMTP on :1025, web UI on http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]

  # Observability — Grafana LGTM (Loki/Grafana/Tempo/Mimir) + OTel collector in one image.
  # Grafana UI http://localhost:3000 (admin/admin); OTLP receivers on 4317 (gRPC) / 4318 (HTTP).
  lgtm:
    image: grafana/otel-lgtm:latest
    ports: ["3000:3000", "4317:4317", "4318:4318", "3200:3200"] # +Tempo query API
    volumes: ["lgtm_data:/data"]

volumes:
  pgdata:
  rustfs_data:
  meili_data:
  lgtm_data:
